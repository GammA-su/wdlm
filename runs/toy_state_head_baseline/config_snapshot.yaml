model_type: state_head_baseline
seed: 42
output_dir: runs/toy_state_head_baseline
best_metric: exact_state_accuracy
best_metric_mode: null
data:
  train_path: data/toy_world/splits/train.jsonl
  val_path: data/toy_world/splits/val.jsonl
  split_dir: data/toy_world/splits
  split_paths: {}
  benchmark_splits:
  - val
  - test_iid
  - test_lexical_ood
  - test_paraphrase_ood
  - test_compositional_ood
  - test_length_ood
  max_vocab_size: 512
  max_seq_len: 48
  max_paraphrases: 3
model:
  d_model: 64
  n_heads: 4
  n_layers: 2
  ffn_dim: 128
  dropout: 0.1
  max_seq_len: 48
  state_dim: 64
  use_state_conditioning: true
optim:
  batch_size: 8
  lr: 0.001
  epochs: 2
  max_steps: 20
  resume_from: null
loss:
  text: 1.0
  state: 1.0
  paraphrase: 0.0
  contrastive: 0.0
