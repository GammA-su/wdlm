model_type: wdlm
seed: 42
device: auto
precision: auto
output_dir: runs/toy_wdlm
best_metric: per_field_accuracy
best_metric_mode: null
data:
  train_path: data/toy_world/splits/train.jsonl
  val_path: data/toy_world/splits/val.jsonl
  split_dir: data/toy_world/splits
  split_paths: {}
  benchmark_splits:
  - val
  - test_iid
  - test_lexical_ood
  - test_paraphrase_ood
  - test_compositional_ood
  - test_length_ood
  max_vocab_size: 512
  max_seq_len: 48
  max_paraphrases: 3
  num_workers: null
  pin_memory: null
  persistent_workers: null
  prefetch_factor: 2
model:
  d_model: 128
  n_heads: 4
  n_layers: 4
  ffn_dim: 256
  dropout: 0.1
  max_seq_len: 48
  state_dim: 128
  use_state_conditioning: true
optim:
  batch_size: 16
  lr: 0.001
  epochs: 30
  max_steps: 500
  resume_from: null
loss:
  text: 1.0
  state: 1.0
  paraphrase: 0.2
  contrastive: 0.1
